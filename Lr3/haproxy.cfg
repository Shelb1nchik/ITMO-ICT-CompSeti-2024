global
    maxconn 100

defaults
    mode tcp
    retries 3

listen stats
    mode http
    bind *:7000
    stats enable

listen postgres
    bind *:5432
    option httpchk
    http-check expect status 200
    server pg_master pg-master:5432 check port 8008
    server pg_slave pg-slave:5432 check port 8008